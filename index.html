<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entity News</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: #fff;
}

/* HEADER */
header {
  background: #111827;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
}

header h1 { color: #ef4444; }

nav a {
  color: #fff;
  margin-left: 15px;
  text-decoration: none;
}

/* TICKER */
.ticker {
  background: black;
  overflow: hidden;
  white-space: nowrap;
  padding: 10px;
}

#ticker-text {
  display: inline-block;
  animation: scroll 25s linear infinite;
  color: #ef4444;
}

@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* LAYOUT */
.main {
  display: grid;
  grid-template-columns: 3fr 1fr;
  gap: 20px;
  padding: 20px;
}

/* NEWS GRID */
.news-grid {
  display: grid;
  gap: 20px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 10px;
}

.card img { width: 100%; }

.card h3 { color: #38bdf8; cursor: pointer; }

/* SIDEBAR */
.sidebar {
  background: #111827;
  padding: 15px;
  border-radius: 10px;
}

.sidebar h3 {
  color: #ef4444;
}

.sidebar p {
  cursor: pointer;
  margin-bottom: 10px;
}

/* ADS */
.ad {
  background: #ef4444;
  padding: 20px;
  margin-top: 20px;
  text-align: center;
  border-radius: 10px;
}

/* SEARCH */
.search-bar {
  text-align: center;
  margin: 10px;
}

.search-bar input {
  padding: 10px;
  width: 250px;
}

button {
  padding: 10px;
  background: #ef4444;
  color: white;
  border: none;
}

footer {
  background: #111827;
  text-align: center;
  padding: 15px;
}
</style>
</head>

<body>

<header>
  <h1>Entity News</h1>
  <nav>
    <a href="index.html" onclick="loadNews()">Home</a>
    <a href="business.html" onclick="loadCategory('business')">Business</a>
    <a href="sport.html">Sports</a>
    <a href="tech.html">Tech</a>
  </nav>
</header>

<div class="ticker">
  <div id="ticker-text">Loading...</div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput">
  <button onclick="searchNews()">Search</button>
</div>

<div class="main">

<!-- LEFT: NEWS -->
<div>
  <h2>🔥 Trending Now</h2>
  <div class="news-grid" id="news-container"></div>
</div>

<!-- RIGHT: SIDEBAR -->
<div class="sidebar">
  <h3>Trending Headlines</h3>
  <div id="sidebar"></div>

  <!-- AD SPACE -->
  <div class="ad">
    💰 Your Ad Here  
    <br><br>
    Promote your business
  </div>
</div>

</div>

<footer>
© 2026 Entity News
</footer>

<script>
const apiKey = "c69fbafac48a745e46fc4314c7f69d49";

/* FETCH */
async function fetchNews(url) {
  const res = await fetch(url);
  const data = await res.json();

  const articles = data.articles;

  const container = document.getElementById("news-container");
  const sidebar = document.getElementById("sidebar");

  container.innerHTML = "";
  sidebar.innerHTML = "";

  articles.forEach((a, i) => {

    // MAIN
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${a.image}">
      <h3 onclick="window.open('${a.url}')">${a.title}</h3>
      <p>${a.description || ""}</p>
    `;

    container.appendChild(card);

    // SIDEBAR (TOP 5)
    if (i < 5) {
      const item = document.createElement("p");
      item.innerText = "👉 " + a.title;
      item.onclick = () => window.open(a.url);
      sidebar.appendChild(item);
    }
  });
}

/* LOAD */
function loadNews() {
  fetchNews(`https://gnews.io/api/v4/top-headlines?country=za&max=10&apikey=${apiKey}`);
}

function loadCategory(cat) {
  fetchNews(`https://gnews.io/api/v4/top-headlines?topic=${cat}&apikey=${apiKey}`);
}

function searchNews() {
  const q = document.getElementById("searchInput").value;
  fetchNews(`https://gnews.io/api/v4/search?q=${q}&apikey=${apiKey}`);
}

/* TICKER */
async function loadTicker() {
  const res = await fetch(`https://gnews.io/api/v4/top-headlines?country=za&max=5&apikey=${apiKey}`);
  const data = await res.json();

  document.getElementById("ticker-text").innerText =
    data.articles.map(a => a.title).join(" 🔴 ");
}

/* AUTO REFRESH */
setInterval(loadNews, 60000);

loadNews();
loadTicker();
</script>

</body>
</html>

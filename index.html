<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entity News Live</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: #111827;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 { color: #ef4444; }

    input {
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    .container {
      padding: 20px;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      color: #38bdf8;
    }

    button {
      background: #ef4444;
      border: none;
      padding: 8px;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #dc2626;
    }
  </style>
</head>

<body>

<header>
  <h1>Entity News</h1>
  <input type="text" id="search" placeholder="Search news...">
</header>

<div class="container">
  <h2>Latest Headlines</h2>
  <div id="news" class="news-grid"></div>
</div>

<script>
const apiKey = "aa733999b63a4c8f9dd7c10d4d8a98a9";
const newsContainer = document.getElementById("news");
const searchInput = document.getElementById("search");

// Load top headlines
async function loadNews(query = "") {
  let url = https://newsapi.org/v2/top-headlines?country=us&apiKey=${apiKey};

  if (query) {
    url = https://newsapi.org/v2/everything?q=${query}&apiKey=${apiKey};
  }

  const res = await fetch(url);
  const data = await res.json();

  displayNews(data.articles);
}

function displayNews(articles) {
  newsContainer.innerHTML = "";

  articles.forEach(article => {
    const card = document.createElement("div");
    card.classList.add("card");

    card.innerHTML = `
      <img src="${article.urlToImage || 'https://via.placeholder.com/300'}">
      <h3>${article.title}</h3>
      <p>${article.description || "No description available."}</p>
      <button onclick="window.open('${article.url}')">Read More</button>
    `;

    newsContainer.appendChild(card);
  });
}

// Search functionality
searchInput.addEventListener("keyup", (e) => {
  if (e.key === "Enter") {
    loadNews(searchInput.value);
  }
});

// Load default news on start
loadNews();
</script>

</body>
</html>

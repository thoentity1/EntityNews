<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entity News</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: #fff;
}

header {
  background: #111827;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 { color: #ef4444; margin: 0; }

nav a {
  color: #fff;
  margin-left: 15px;
  text-decoration: none;
  font-weight: bold;
}

nav a:hover { color: #ef4444; }

.breaking {
  background: #ef4444;
  padding: 10px;
  text-align: center;
}

/* SEARCH */
.search-bar {
  text-align: center;
  margin: 15px;
}

.search-bar input {
  padding: 10px;
  width: 250px;
  border-radius: 5px;
  border: none;
}

.search-bar button {
  padding: 10px;
  border: none;
  background: #ef4444;
  color: white;
  cursor: pointer;
}

/* CONTAINER */
.container { padding: 20px; }

/* FEATURED */
.featured {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-bottom: 30px;
}

.featured img {
  width: 100%;
  max-width: 500px;
  border-radius: 10px;
}

.featured-content h2 { color: #facc15; }

/* NEWS GRID */
.news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover { transform: scale(1.03); }

.card img { width: 100%; border-radius: 10px; }

.card h3 { color: #38bdf8; }

button {
  background: #ef4444;
  border: none;
  padding: 10px;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

button:hover { background: #dc2626; }

footer {
  background: #111827;
  text-align: center;
  padding: 15px;
  margin-top: 30px;
}
</style>
</head>

<body>

<header>
  <h1>Entity News</h1>
  <nav>
    <a href="#" onclick="loadNews()">Home</a>
    <a href="business.html" onclick="loadCategory('business')">Business</a>
    <a href="#" onclick="loadCategory('sports')">Sports</a>
    <a href="#" onclick="loadCategory('technology')">Tech</a>
  </nav>
</header>

<div class="breaking">
🔴 Live News Updates - South Africa & Worldwide
</div>

<!-- SEARCH -->
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search news...">
  <button onclick="searchNews()">Search</button>
</div>

<div class="container">

<!-- FEATURED -->
<div class="featured">
  <img id="featured-img" src="">
  <div class="featured-content">
    <h2 id="featured-title">Loading...</h2>
    <p id="featured-desc"></p>
    <button id="featured-btn">Read More</button>
  </div>
</div>

<h2>Latest News</h2>

<div class="news-grid" id="news-container"></div>

</div>

<footer>
© 2026 Entity News | All Rights Reserved
</footer>

<script>
const apiKey = "c69fbafac48a745e46fc4314c7f69d49";

/* FETCH FUNCTION */
async function fetchNews(url) {
  try {
    const res = await fetch(url);
    const data = await res.json();

    const articles = data.articles;

    if (!articles || articles.length === 0) {
      alert("No news found");
      return;
    }

    // FEATURED
    const f = articles[0];
    document.getElementById("featured-img").src = f.image || "";
    document.getElementById("featured-title").innerText = f.title;
    document.getElementById("featured-desc").innerText = f.description || "";
    document.getElementById("featured-btn").onclick = () => window.open(f.url);

    // GRID
    const container = document.getElementById("news-container");
    container.innerHTML = "";

    articles.slice(1).forEach(a => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${a.image || 'https://via.placeholder.com/300'}">
        <h3>${a.title}</h3>
        <p>${a.description || ""}</p>
        <button onclick="window.open('${a.url}')">Read More</button>
      `;

      container.appendChild(card);
    });

  } catch (e) {
    console.log(e);
  }
}

/* LOAD DEFAULT NEWS */
function loadNews() {
  fetchNews(`https://gnews.io/api/v4/top-headlines?country=za&max=10&apikey=${apiKey}`);
}

/* CATEGORY */
function loadCategory(category) {
  fetchNews(`https://gnews.io/api/v4/top-headlines?topic=${category}&apikey=${apiKey}`);
}

/* SEARCH */
function searchNews() {
  const q = document.getElementById("searchInput").value;
  fetchNews(`https://gnews.io/api/v4/search?q=${q}&apikey=${apiKey}`);
}

/* INITIAL LOAD */
loadNews();
</script>

</body>
</html>
